<div class="layout">

  <!-- ===== LEFT SIDEBAR ===== -->
  <div class="sidebar">

    <div class="logo">
      𝓖𝓮𝓽 𝓨𝓸𝓾𝓻 𝓕𝓻𝓾𝓲𝓽
    </div>

    <ul class="menu">
      <li class="active">🏠 Dashboard</li>
      <li>📦 Orders</li>
      <li>🛍 Products</li>
      <li>👥 Customers</li>
      <li>📊 Analytics</li>
      <li>💬 Messages</li>
      <li>⚙ Settings</li>
    </ul>

    <div class="logout">
      🚪 Logout
    </div>

  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main-content">

    <div class="top-header">


      <div class="header-right">

        <div class="search-box" [class.has-value]="searchValue !== ''">
          <span class="search-icon" (click)="searchInput.focus()" title="Search">🔍</span>
          <input #searchInput class="search-input" type="text" placeholder="Search" aria-label="Search" (input)="onSearch(searchInput.value)">
        </div>

        <!-- Sort By dropdown -->
        <select class="filter sort-select" #sortSelect (change)="onSortChange(sortSelect.value)">
          <option value="default">Sort By</option>
          <option value="name-asc">Name: A → Z</option>
          <option value="name-desc">Name: Z → A</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
        </select>

        <select class="filter">
          <option>Payment Status</option>
        </select>

        <div class="icon-btn" (click)="goToCart()" title="Cart">🛒</div>

        <div class="icon-btn">🔔</div>

        <div class="profile-circle">
          BP
        </div>

      </div>
    </div>

    <div *ngIf="isLoading" class="loading">Loading products...</div>
    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

    <div *ngIf="noResults" class="no-results">No products found</div>

    <div class="grid" *ngIf="!noResults">

      <ng-container *ngFor="let product of products; let i = index">

        <!-- Product Card -->
        <app-product-card
                [product]="product">
        </app-product-card>

        <!-- Ad Placeholder after every 6 products
        <div *ngIf="(i + 1) % 3 === 0" class="ad-card">
          <div class="ad-content">
            <h3>Sponsored</h3>
            <p>Your Advertisement Here</p>
          </div>
        </div>-->

      </ng-container>

    </div>


  </div>

</div>
