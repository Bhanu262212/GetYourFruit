<div class="card" (click)="onCardClick()" style="cursor: pointer;">
  <!-- Top Right Action (Heart) -->
  <button class="heart-btn" (click)="$event.stopPropagation()">
    ♡
  </button>

  <div class="image-wrapper">
    <img [src]="product.imageUrl" alt="{{product.productName}}" class="product-image">
  </div>

  <div class="card-bottom">
    <h3 class="title">{{ product.productName }}</h3>

    <div class="price-row">
      <div class="prices">
        <span class="current-price">${{ product.price }}</span>
        <span class="old-price" *ngIf="product.price < 1500">${{ product.price + 60 }}</span> <!-- Mock old price -->
      </div>
      <button class="add-btn" (click)="onAddToCart($event)">
        <span class="arrow-icon">↗</span>
      </button>
    </div>
  </div>
</div>
